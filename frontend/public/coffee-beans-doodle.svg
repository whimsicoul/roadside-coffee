<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Scattered coffee beans -->
  <g opacity="0.85">
    <!-- Large beans -->
    <ellipse cx="30" cy="30" rx="4" ry="7" fill="#5C3D2E" transform="rotate(25 30 30)"/>
    <ellipse cx="60" cy="45" rx="4" ry="7" fill="#6B4423" transform="rotate(-35 60 45)"/>
    <ellipse cx="90" cy="25" rx="4" ry="7" fill="#5C3D2E" transform="rotate(50 90 25)"/>
    <ellipse cx="140" cy="50" rx="4" ry="7" fill="#7A5433" transform="rotate(-15 140 50)"/>

    <!-- Medium beans -->
    <ellipse cx="20" cy="80" rx="3.5" ry="6" fill="#6B4423" transform="rotate(65 20 80)"/>
    <ellipse cx="75" cy="70" rx="3.5" ry="6" fill="#5C3D2E" transform="rotate(-45 75 70)"/>
    <ellipse cx="120" cy="85" rx="3.5" ry="6" fill="#6B4423" transform="rotate(20 120 85)"/>
    <ellipse cx="160" cy="75" rx="3.5" ry="6" fill="#5C3D2E" transform="rotate(-60 160 75)"/>

    <!-- Small beans -->
    <ellipse cx="50" cy="120" rx="3" ry="5" fill="#7A5433" transform="rotate(30 50 120)"/>
    <ellipse cx="100" cy="110" rx="3" ry="5" fill="#6B4423" transform="rotate(-25 100 110)"/>
    <ellipse cx="150" cy="130" rx="3" ry="5" fill="#5C3D2E" transform="rotate(40 150 130)"/>
    <ellipse cx="40" cy="150" rx="3" ry="5" fill="#5C3D2E" transform="rotate(-50 40 150)"/>
    <ellipse cx="110" cy="155" rx="3" ry="5" fill="#7A5433" transform="rotate(15 110 155)"/>

    <!-- Very small beans for depth -->
    <ellipse cx="70" cy="140" rx="2.5" ry="4" fill="#6B4423" transform="rotate(70 70 140)"/>
    <ellipse cx="130" cy="160" rx="2.5" ry="4" fill="#5C3D2E" transform="rotate(-35 130 160)"/>
  </g>
</svg>
