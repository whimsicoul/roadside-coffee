<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Coffee cup with decorative plants -->
  <g>
    <!-- Cup body -->
    <path d="M 40 80 L 35 140 Q 35 145 42 145 L 118 145 Q 125 145 125 140 L 120 80 Z"
          fill="none" stroke="#8B6F47" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Cup handle -->
    <path d="M 123 95 Q 155 95 155 120"
          fill="none" stroke="#8B6F47" stroke-width="3" stroke-linecap="round"/>

    <!-- Coffee inside -->
    <ellipse cx="80" cy="135" rx="38" ry="8" fill="#6B4423" opacity="0.4"/>

    <!-- Cup rim -->
    <ellipse cx="80" cy="80" rx="42" ry="7" fill="none" stroke="#8B6F47" stroke-width="2"/>

    <!-- Steam wisps -->
    <path d="M 60 75 Q 62 55 60 35" fill="none" stroke="#A0918C" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M 80 70 Q 82 48 80 25" fill="none" stroke="#A0918C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M 100 75 Q 102 55 100 32" fill="none" stroke="#A0918C" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- Decorative plants in/near cup -->
    <!-- Left plant -->
    <path d="M 50 75 Q 40 50 35 20" fill="none" stroke="#7CB342" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 50 75 Q 45 55 42 28" fill="none" stroke="#6B9B5F" stroke-width="2" stroke-linecap="round"/>
    <path d="M 50 75 Q 55 52 60 22" fill="none" stroke="#7CB342" stroke-width="2" stroke-linecap="round"/>

    <!-- Right plant -->
    <path d="M 110 78 Q 120 52 125 18" fill="none" stroke="#6B9B5F" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 110 78 Q 115 56 118 28" fill="none" stroke="#7CB342" stroke-width="2" stroke-linecap="round"/>
    <path d="M 110 78 Q 105 55 100 20" fill="none" stroke="#6B9B5F" stroke-width="2" stroke-linecap="round"/>

    <!-- Small leaf accents -->
    <path d="M 38 40 L 42 38 L 40 45" fill="#7CB342" opacity="0.7"/>
    <path d="M 55 35 L 58 32 L 57 40" fill="#6B9B5F" opacity="0.7"/>
    <path d="M 120 35 L 123 33 L 122 41" fill="#7CB342" opacity="0.7"/>

    <!-- Saucer/base -->
    <ellipse cx="80" cy="148" rx="48" ry="10" fill="none" stroke="#8B6F47" stroke-width="2" opacity="0.6"/>

    <!-- Decorative dots on cup -->
    <circle cx="55" cy="110" r="1.5" fill="#8B6F47" opacity="0.4"/>
    <circle cx="75" cy="95" r="1.5" fill="#8B6F47" opacity="0.4"/>
    <circle cx="105" cy="105" r="1.5" fill="#8B6F47" opacity="0.4"/>

    <!-- Bottom beans scattered -->
    <ellipse cx="25" cy="175" rx="3" ry="5" fill="#5C3D2E" transform="rotate(45 25 175)"/>
    <ellipse cx="135" cy="180" rx="3" ry="5" fill="#6B4423" transform="rotate(-30 135 180)"/>
    <ellipse cx="60" cy="195" rx="3" ry="5" fill="#5C3D2E" transform="rotate(60 60 195)"/>
    <ellipse cx="110" cy="200" rx="3" ry="5" fill="#7A5433" transform="rotate(-20 110 200)"/>
  </g>
</svg>
