<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" width="160" height="160">
  <!-- Grinder -->
  <g transform="translate(100, 50)">
    <!-- Hopper (top) -->
    <path d="M 25 5 L 35 5 L 40 20 L 20 20 Z" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Burrs -->
    <circle cx="30" cy="28" r="12" fill="none" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
    <circle cx="30" cy="28" r="8" fill="none" stroke="#5C4033" stroke-width="1" opacity="0.5"/>
    <!-- Body -->
    <rect x="15" y="40" width="30" height="35" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" rx="2"/>
    <!-- Drawer -->
    <rect x="18" y="55" width="24" height="15" fill="none" stroke="#A0918C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handle crank -->
    <path d="M 45 30 Q 60 20 65 35" fill="none" stroke="#8B6F47" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="65" cy="35" r="3" fill="#8B6F47"/>
  </g>

  <!-- Latte art representation -->
  <g transform="translate(40, 160)">
    <!-- Cup outline -->
    <path d="M 15 15 L 10 45 Q 10 48 15 48 L 45 48 Q 50 48 50 45 L 45 15 Z" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Coffee fill -->
    <ellipse cx="30" cy="42" rx="18" ry="4" fill="#6B4423" opacity="0.5"/>
    <!-- Latte art leaf -->
    <path d="M 22 40 Q 20 35 25 32 Q 30 35 28 40" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 32 40 Q 30 35 35 32 Q 40 35 38 40" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handle -->
    <path d="M 50 25 Q 65 25 65 35" fill="none" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Spoon with coffee -->
  <g transform="translate(150, 160)">
    <!-- Spoon bowl -->
    <ellipse cx="15" cy="15" rx="6" ry="8" fill="none" stroke="#C8974E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Coffee in spoon -->
    <ellipse cx="15" cy="16" rx="4" ry="5" fill="#6B4423" opacity="0.6"/>
    <!-- Handle -->
    <path d="M 18 20 L 35 35" stroke="#C8974E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Decorative swirl -->
  <g transform="translate(85, 220)">
    <path d="M 5 10 Q 10 0 20 5 Q 25 10 20 15 Q 10 20 5 10" fill="none" stroke="#A0918C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
