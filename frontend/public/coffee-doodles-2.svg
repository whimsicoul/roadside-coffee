<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" width="180" height="180">
  <!-- Espresso machine -->
  <g transform="translate(80, 40)">
    <!-- Machine body -->
    <rect x="20" y="30" width="60" height="70" fill="none" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" rx="4"/>
    <!-- Top section -->
    <rect x="25" y="20" width="50" height="12" fill="none" stroke="#5C4033" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" rx="2"/>
    <!-- Portafilter -->
    <path d="M 45 42 L 40 65" fill="none" stroke="#7A5433" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40" cy="68" r="4" fill="none" stroke="#7A5433" stroke-width="2"/>
    <!-- Spout -->
    <path d="M 50 95 L 60 100" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
    <!-- Cup under spout -->
    <path d="M 55 102 Q 55 110 60 112 Q 65 110 65 102" fill="none" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Pastry/croissant -->
  <g transform="translate(30, 150)">
    <path d="M 10 10 Q 5 15 8 25 Q 12 30 20 28 Q 28 26 30 20 Q 32 12 25 8 Q 18 5 10 10" fill="none" stroke="#C8974E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Layers -->
    <path d="M 12 14 Q 10 18 12 24" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 18 10 Q 18 18 20 26" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Coffee filter/pour-over -->
  <g transform="translate(180, 140)">
    <!-- Filter cone -->
    <path d="M 15 5 L 8 30 L 32 30 Z" fill="none" stroke="#8B6F47" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Ridges -->
    <path d="M 12 12 L 28 12" stroke="#8B6F47" stroke-width="1" opacity="0.5"/>
    <path d="M 10 20 L 30 20" stroke="#8B6F47" stroke-width="1" opacity="0.5"/>
    <!-- Coffee grounds inside -->
    <ellipse cx="20" cy="22" rx="10" ry="6" fill="#6B4423" opacity="0.3"/>
    <!-- Support stand -->
    <line x1="10" y1="30" x2="5" y2="45" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="35" y2="45" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="45" x2="35" y2="45" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Cup below -->
    <path d="M 12 48 L 10 65 Q 10 68 15 68 L 25 68 Q 30 68 30 65 L 28 48" fill="none" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Coffee beans arranged -->
  <g transform="translate(120, 220)">
    <ellipse cx="0" cy="0" rx="2.5" ry="4" fill="#5C3D2E" transform="rotate(20)"/>
    <ellipse cx="8" cy="2" rx="2.5" ry="4" fill="#6B4423" transform="rotate(-25 8 2)"/>
    <ellipse cx="16" cy="0" rx="2.5" ry="4" fill="#5C3D2E" transform="rotate(35 16 0)"/>
    <ellipse cx="24" cy="4" rx="2.5" ry="4" fill="#7A5433" transform="rotate(-10 24 4)"/>
    <ellipse cx="4" cy="12" rx="2.5" ry="4" fill="#6B4423" transform="rotate(50 4 12)"/>
    <ellipse cx="12" cy="14" rx="2.5" ry="4" fill="#5C3D2E" transform="rotate(-30 12 14)"/>
  </g>
</svg>
